name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            bundle: dmg
            artifact: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            bundle: nsis
            artifact: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            rust_targets: x86_64-unknown-linux-gnu
            bundle: deb
            artifact: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CI: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.rust_targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> src-tauri/target

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl file libssl-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev patchelf xvfb weston dbus-x11

      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Build package
        run: npm run tauri -- build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Ubuntu Wayland and X11 smoke
        if: runner.os == 'Linux'
        shell: bash
        run: bash .github/scripts/linux-smoke.sh src-tauri/target/${{ matrix.target }}/release/screen-wall-control

      - uses: actions/upload-artifact@v4
        with:
          name: screen-wall-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
